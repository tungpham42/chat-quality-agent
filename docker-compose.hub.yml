version: "3.8"

# Dùng file này nếu bạn muốn dùng image có sẵn từ Docker Hub
# thay vì build từ source code.
#
# Cách dùng:
#   1. Tải file này và .env.example về cùng thư mục
#   2. Sao chép .env.example thành .env và điền thông tin
#   3. docker compose -f docker-compose.hub.yml up -d

services:
  nginx:
    image: buitanviet/chat-quality-agent-nginx:latest
    container_name: cqatp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - LEGO_DOMAIN=${LEGO_DOMAIN:-}
      - LEGO_EMAIL=${LEGO_EMAIL:-}
    volumes:
      - lego_certs:/etc/lego
      - lego_webroot:/var/www/acme
    depends_on:
      - app

  app:
    image: buitanviet/chat-quality-agent:latest
    container_name: cqatp-app
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=3307
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/cqatp/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  db:
    image: mysql:8.0
    container_name: cqatp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-cqatp}
      MYSQL_USER: ${DB_USER:-cqatp}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3307"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
  file_storage:
  lego_certs:
  lego_webroot:
